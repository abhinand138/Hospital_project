{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MedCare System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .custom-body-bg {
            background: url('{% static "css/bg-blur.svg" %}') center/cover no-repeat;
            background-color: var(--background-dark);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 custom-body-bg py-5">
    
    <!-- Background Accents -->
    <div class="position-fixed top-0 start-0 w-100 h-100 z-n1 overflow-hidden pointer-events-none">
        <div class="position-absolute bg-primary rounded-circle blur-3xl opacity-20" style="width: 50vw; height: 50vw; top: -20%; left: -10%; filter: blur(100px);"></div>
        <div class="position-absolute bg-danger rounded-circle blur-3xl opacity-20" style="width: 40vw; height: 40vw; bottom: -10%; right: -10%; filter: blur(100px);"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-6">
                <div class="text-center mb-4">
                    <a href="/" class="text-decoration-none">
                        <h2 class="text-gradient fw-bold display-5 mb-0"><i class="bi bi-heart-pulse-fill text-danger me-2"></i>MedCare</h2>
                    </a>
                    <p class="text-secondary mt-2">Create your patient account to book appointments</p>
                </div>
                
                <div class="glass-panel p-4 p-md-5 shadow-lg border border-secondary border-opacity-25 rounded-4 position-relative overflow-hidden">
                    <form method="POST" action="/register/">
                        {% csrf_token %}
                        
                        {% if error %}
                        <div class="alert alert-danger py-2 text-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                        </div>
                        {% endif %}
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-light">Username</label>
                                <input type="text" name="username" class="form-control form-control-custom" placeholder="Choose username" required autofocus>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">Password</label>
                                <input type="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Full Name</label>
                            <input type="text" name="name" class="form-control form-control-custom" placeholder="e.g. John Doe" required>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-light">Age</label>
                                <input type="number" name="age" class="form-control form-control-custom" placeholder="Age" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">Gender</label>
                                <select name="gender" class="form-select form-control-custom bg-dark text-light" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Phone</label>
                            <input type="text" name="phone" class="form-control form-control-custom" placeholder="Phone Number" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-light">Address</label>
                            <textarea name="address" class="form-control form-control-custom" placeholder="Your Address" rows="2" required></textarea>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary-custom py-3 fs-5 fw-bold rounded-pill shadow">
                                Register Account <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <p class="text-secondary small">Already have an account? <a href="/login" class="text-primary text-decoration-none">Sign in here</a>.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
