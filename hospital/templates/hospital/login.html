{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MedCare System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .custom-body-bg {
            background: url('{% static "css/bg-blur.svg" %}') center/cover no-repeat;
            background-color: var(--background-dark);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 custom-body-bg">
    
    <!-- Background Accents -->
    <div class="position-fixed top-0 start-0 w-100 h-100 z-n1 overflow-hidden pointer-events-none">
        <div class="position-absolute bg-primary rounded-circle blur-3xl opacity-20" style="width: 50vw; height: 50vw; top: -20%; left: -10%; filter: blur(100px);"></div>
        <div class="position-absolute bg-danger rounded-circle blur-3xl opacity-20" style="width: 40vw; height: 40vw; bottom: -10%; right: -10%; filter: blur(100px);"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="text-center mb-4">
                    <a href="/" class="text-decoration-none">
                        <h2 class="text-gradient fw-bold display-5 mb-0"><i class="bi bi-heart-pulse-fill text-danger me-2"></i>MedCare</h2>
                    </a>
                    <p class="text-secondary mt-2">Sign in to your account to continue</p>
                </div>
                
                <div class="glass-panel p-4 p-md-5 shadow-lg border border-secondary border-opacity-25 rounded-4 position-relative overflow-hidden">
                    <form method="POST" action="/login/">
                        {% csrf_token %}
                        
                        {% if error %}
                        <div class="alert alert-danger py-2 text-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                        </div>
                        {% endif %}
                        <div class="mb-4">
                            <label class="form-label text-light">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary"><i class="bi bi-person text-secondary"></i></span>
                                <input type="text" name="username" class="form-control form-control-custom border-start-0 ps-0" placeholder="Enter your username" required autofocus>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-light d-flex justify-content-between">
                                Password
                                <a href="#" class="text-decoration-none text-primary small">Forgot?</a>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary"><i class="bi bi-lock text-secondary"></i></span>
                                <input type="password" name="password" class="form-control form-control-custom border-start-0 ps-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input bg-transparent border-secondary" id="rememberMe">
                            <label class="form-check-label text-secondary small" for="rememberMe">Remember me for 30 days</label>
                        </div>
                        
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary-custom py-3 fs-5 fw-bold rounded-pill shadow">
                                Sign In <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <p class="text-secondary small">Protected system. Unauthorised access is strictly prohibited.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
