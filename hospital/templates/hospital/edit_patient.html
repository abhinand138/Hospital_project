{% extends 'hospital/base.html' %}

{% block content %}
<div class="mb-4">
    <a href="/patients" class="text-decoration-none text-secondary mb-2 d-inline-block"><i class="bi bi-arrow-left me-1"></i> Back to Patients</a>
    <h2 class="fw-bold"><i class="bi bi-pencil-square me-2" style="color: var(--primary-color);"></i>Edit Patient Details</h2>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="glass-panel p-4 p-md-5">
            <form method="POST" action="/edit_patient/{{ patient.id }}/">
                {% csrf_token %}
                
                <div class="row g-4">
                    <div class="col-md-12">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control form-control-custom" name="name" value="{{ patient.name }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control form-control-custom" name="age" value="{{ patient.age }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select form-control-custom" name="gender" required>
                            <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control form-control-custom" name="phone" value="{{ patient.phone }}" required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Address</label>
                        <textarea class="form-control form-control-custom" name="address" rows="3" required>{{ patient.address }}</textarea>
                    </div>

                    <div class="col-12 mt-4 pt-3 border-top border-secondary border-opacity-25 text-end">
                        <a href="/patients" class="btn btn-link text-secondary text-decoration-none me-3">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom px-5"><i class="bi bi-check-circle me-2"></i>Update Patient</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
