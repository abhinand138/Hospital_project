{% extends 'hospital/base.html' %}

{% block content %}
<div class="mb-4">
    <a href="/patients" class="text-decoration-none text-secondary mb-2 d-inline-block"><i class="bi bi-arrow-left me-1"></i> Back to Patients</a>
    <h2 class="fw-bold"><i class="bi bi-person-plus-fill me-2" style="color: var(--primary-color);"></i>Register New Patient</h2>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="glass-panel p-4 p-md-5">
            <form method="POST" action="/add_patient/">
                {% csrf_token %}
                
                <div class="row g-4">
                    <div class="col-md-12">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control form-control-custom" name="name" required placeholder="e.g. John Doe">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control form-control-custom" name="age" required placeholder="e.g. 45">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select form-control-custom" name="gender" required>
                            <option value="" selected disabled>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control form-control-custom" name="phone" required placeholder="e.g. +1 234 567 8900">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Address</label>
                        <textarea class="form-control form-control-custom" name="address" rows="3" required placeholder="Enter full address here..."></textarea>
                    </div>

                    <div class="col-12 mt-4 pt-3 border-top border-secondary border-opacity-25 text-end">
                        <a href="/patients" class="btn btn-link text-secondary text-decoration-none me-3">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom px-5"><i class="bi bi-check-circle me-2"></i>Save Patient</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    
    <div class="col-lg-4 mt-4 mt-lg-0 d-none d-lg-block">
        <div class="glass-card p-4 h-100 d-flex flex-column justify-content-center text-center">
            <i class="bi bi-shield-check display-1 mb-3 text-success opacity-75"></i>
            <h5 class="fw-bold text-light">Secure Records</h5>
            <p class="text-secondary small">All patient info is securely stored and encrypted in our database in compliance with HIPAA guidelines.</p>
        </div>
    </div>
</div>
{% endblock %}
